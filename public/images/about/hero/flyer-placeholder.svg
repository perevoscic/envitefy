<svg xmlns="http://www.w3.org/2000/svg" width="960" height="1280" viewBox="0 0 960 1280" role="img" aria-labelledby="title desc">
  <title id="title">Placeholder event flyer mockup</title>
  <desc id="desc">A fictional event flyer layout used as placeholder artwork.</desc>
  <defs>
    <linearGradient id="desk" x1="0" y1="0" x2="960" y2="1280" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0e1726"/>
      <stop offset="0.5" stop-color="#173f58"/>
      <stop offset="1" stop-color="#0f1020"/>
    </linearGradient>
    <linearGradient id="paper" x1="150" y1="130" x2="840" y2="1140" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fffaf0"/>
      <stop offset="0.6" stop-color="#eefbff"/>
      <stop offset="1" stop-color="#fff3d8"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="188" y1="202" x2="746" y2="660" gradientUnits="userSpaceOnUse">
