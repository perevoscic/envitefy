<svg xmlns="http://www.w3.org/2000/svg" width="960" height="1280" viewBox="0 0 960 1280" role="img" aria-labelledby="title desc">
  <title id="title">Placeholder live card mockup</title>
  <desc id="desc">A fictional live event card layout used as placeholder artwork.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="40" x2="920" y2="1240" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#21182f"/>
      <stop offset="0.42" stop-color="#583f86"/>
      <stop offset="0.7" stop-color="#f6a17b"/>
      <stop offset="1" stop-color="#fff0cf"/>
    </linearGradient>
    <linearGradient id="glass" x1="160" y1="160" x2="760" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fffdf8" stop-opacity="0.95"/>
      <stop offset="0.54" stop-color="#f6ecff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#fff6e6" stop-opacity="0.94"/>
    </linearGradient>
    <linearGradient id="accent" x1="220" y1="210" x2="760" y2="920" gradientUnits="userSpaceOnUse">
